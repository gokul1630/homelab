---
# tasks file for roles/common

- name: Update package cache
  when: ansible_os_family == "Debian"
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
    name:
      - python3-pip
      - python3-venv
      - git
      - nano
      - curl
      - wget
      - ca-certificates
      - gnupg
      - samba
      - smbclient
    state: present

- name: Setup cronjob to shutdown system at spefic time
  ansible.builtin.cron:
    name: shutdown system at 12 AM
    hour: '00'
    minute: '00'
    job: "/usr/sbin/shutdown now"

- name: Setup samba
  ansible.builtin.template:
    src: samba.conf.j2
    dest: /etc/samba/smb.conf
    mode: '0644'

- name: Add samba user
  ansible.builtin.user:
    name: '{{ sudo_user }}'
    state: present
    create_home: true

- name: Add user to Samba database
  ansible.builtin.shell: >
    set -o pipefail;
    (echo "{{ common_samba_password }}"; echo "{{ common_samba_password }}") | smbpasswd -s -a {{ sudo_user }}
  register: common_smb_user_result
  changed_when: "'Added user' in common_smb_user_result.stdout"


- name: Copy debian backup script
  ansible.builtin.template:
    src: debian_backup_script.sh.j2
    dest: /usr/local/bin/debian-backup.sh
    mode: '0644'

- name: Setup debian backup cron
  ansible.builtin.cron:
    name: Take BTRFS backup to oracle cloud
    hour: '19'
    minute: '00'
    day: '*/4'
    user: root
    job: "/usr/local/bin/debian-backup.sh >> /var/log/btrfs-backup.log 2>&1"
