---
# tasks file for roles/docker

- name: Set Docker architecture variable
  ansible.builtin.set_fact:
    docker_arch: "{{ arch_map[ansible_architecture] }}"
  vars:
    arch_map:
      x86_64: amd64
      aarch64: arm64

- name: Setup keyring
  ansible.builtin.file:
    dest: /etc/apt/keyrings
    mode: '0755'
    state: directory

- name: Fetch gpg key
  ansible.builtin.uri:
    url: https://download.docker.com/linux/{{ ansible_os_family | lower }}/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: '0444'
    force: true

- name: Add docker repo
  ansible.builtin.apt_repository:
    repo: >-
       deb [arch={{ docker_arch }}
        signed-by=/etc/apt/keyrings/docker.asc]
        https://download.docker.com/linux/{{ ansible_os_family | lower }}
        {{ ansible_distribution_release }} stable
    state: present
    filename: docker

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true


- name: Install docker
  ansible.builtin.apt:
    state: present
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin

- name: Enable docker service
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

- name: Add group
  ansible.builtin.group:
    name: docker
    state: present

- name: Add user to group
  ansible.builtin.user:
    name: '{{ ansible_user }}'
    groups: docker
    append: true
